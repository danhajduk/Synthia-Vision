mqtt:
  host: "10.0.0.100"
  port: 1883
  heartbeat_interval_seconds: 30
  username: "synthia_vision"
  password: "${MQTT_PASSWORD}"
  tls: false

  subscribe:
    frigate_events_topic: "frigate/events"

  publish:
    retain: true
    qos: 1

  discovery:
    enabled: true
    prefix: "homeassistant"
    device:
      manufacturer: "Dan Hajduk"
      model: "Synthia Vision Node"
      sw_version: "0.1.0"
    node_id: "homeassistant_pc_01"
