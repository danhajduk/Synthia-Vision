# Base defaults anchor file. Keep broad defaults here only.
ui:
  subtitle: "OpenAI-powered camera events"
  preview_enabled: true
  preview_enabled_interval_s: 2
  preview_disabled_interval_s: 60
  preview_max_active: 1

embeddings:
  enabled: false
  model: "text-embedding-3-small"
  retention_days: 30
  retention_max_rows: 5000
  store_vectors: false

scoring:
  enforce_threshold: false
  threshold: 0.65
  weights:
    time_of_day: 0.25
    camera_zone: 0.25
    ai_confidence: 0.35
    duration: 0.15
  per_camera_overrides: {}
  camera_importance:
    default: 0.5
    overrides: {}
  zone_weights:
    default: 0.5
    overrides: {}
