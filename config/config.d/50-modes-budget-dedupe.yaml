modes:
  doorbell_only_mode:
    enabled: true
    allowed_cameras: ["doorbell", "livingroom"]

  high_precision_mode:
    enabled: false
    overrides:
      confidence_threshold: 0.85

  intent:
    available: ["normal", "delivery_watch", "guest_expected", "high_alert"]
    default: "normal"
    profiles:
      normal: {}
      delivery_watch:
        prompt_preset: "outdoor"
        updates_per_event: 2
      guest_expected:
        updates_per_event: 2
        confidence_threshold: 0.55
      high_alert:
        high_precision_mode: true
        confidence_threshold: 0.85
        monthly_budget: 20.0

budget:
  enabled: true
  currency: "USD"
  monthly_limit: 10.00
  behavior_when_exceeded: "block_openai"
  publish_status: true

dedupe:
  recent_event_ids_max: 400
  per_camera_cooldown_default_s: 30
  ignore_event_types: []

suppression:
  enabled: true
  window_seconds: 15
  max_suppressed_log: 200
