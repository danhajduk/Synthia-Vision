ai:
  provider: "openai"
  vision_detail: "low"
  image_preprocess:
    enabled: true
    max_side_px: 512
    jpeg_quality: 75
    strip_metadata: true
  openai:
    api_key: "${OPENAI_API_KEY}"
    model: "gpt-4o-mini"
    timeout_s: 20
    max_output_tokens: 200
    retry_attempts: 3
    retry_backoff_s: [0.5, 1.0, 2.0]

  structured_output:
    mode: "json_schema"
    schema_name: "synthia_vision_event"
    schema:
      type: object
      additionalProperties: false
      required: ["action", "subject_type", "confidence", "description"]
      properties:
        action:
          type: string
          enum:
            - unknown
            - room_occupied
            - person_passing_by
            - person_approaching
            - person_at_door
            - person_leaving
            - deliver_package
            - pickup_package
            - package_left_unattended
            - vehicle_arrival
            - vehicle_departure
            - vehicle_detected
            - delivery_vehicle
            - loitering
            - suspicious_activity
            - animal_detected
            - person_entered
            - person_exited
            - in_bed
            - out_of_bed
        subject_type:
          type: string
          enum:
            - none
            - adult
            - child
            - pet
            - animal
            - vehicle
            - unknown
        confidence:
          type: number
          minimum: 0
          maximum: 1
        description:
          type: string
          minLength: 1
          maxLength: 200

  prompts:
    default_preset: "general"
    system: "Classify one home camera image. Return JSON only. No identity guesses."
    presets:
      general:
        system: |
          You are Synthia Vision. Classify a single home camera snapshot for automation.
          Do NOT identify people. Do NOT guess names, relationships, or personal traits.
          Return ONLY valid JSON matching the schema. No extra text.
        user: |
          Camera: {camera_name}
          Environment: {environment}
          Purpose: {purpose}
          Choose action ONLY from allowed_actions.
          Choose subject_type ONLY from allowed_subject_types.
          Confidence: 0..1.
          Description: 1 short factual sentence (<= 200 chars). No identity/relationship guesses.
          allowed_actions: {allowed_actions}
          allowed_subject_types: {allowed_subject_types}
          If unclear, action="unknown" and subject_type="unknown".
      doorbell:
        system: |
          You are Synthia Vision. Classify a single doorbell/entry snapshot for home automation.
          Do NOT identify people. Do NOT guess names, relationships, or personal traits.
          Return ONLY valid JSON matching the schema. No extra text.
        user: |
          Camera: {camera_name}
          Environment: {environment}
          Purpose: {purpose}
          Choose action ONLY from allowed_actions.
          Choose subject_type ONLY from allowed_subject_types.
          Confidence: 0..1.
          Description: 1 short factual sentence (<= 200 chars). No identity/relationship guesses.
          Prefer action "person_passing_by" when a person is moving past the entrance without stopping.
          Prefer action "person_approaching" when a person is moving toward the entrance.
          Prefer action "person_at_door" when a person is stopped near the door/threshold.
          Prefer action "person_leaving" when a person is moving away after being near the door.
          Use "deliver_package" or "pickup_package" only when package handling is clearly visible.
          allowed_actions: {allowed_actions}
          allowed_subject_types: {allowed_subject_types}
          If unclear, action="unknown" and subject_type="unknown".
      perimeter_security:
        system: |
          Classify one perimeter security snapshot for home automation.
          Do not identify people. Return only valid JSON matching the schema.
        user: |
          Camera: {camera_name}
          Environment: {environment}
          Purpose: {purpose}
          Choose action ONLY from allowed_actions.
          Choose subject_type ONLY from allowed_subject_types.
          Confidence 0..1.
          Description <= 200 chars, factual.
          allowed_actions: {allowed_actions}
          allowed_subject_types: {allowed_subject_types}
          If unclear, action="unknown", subject_type="unknown".
      driveway:
        system: |
          Classify one driveway snapshot for home automation.
          Do not identify people. Return only valid JSON matching the schema.
        user: |
          Camera: {camera_name}
          Environment: {environment}
          Purpose: {purpose}
          Choose action ONLY from allowed_actions.
          Choose subject_type ONLY from allowed_subject_types.
          Confidence 0..1.
          Description <= 200 chars, factual.
          Prefer vehicle_arrival/vehicle_departure when vehicle motion context is clear.
          allowed_actions: {allowed_actions}
          allowed_subject_types: {allowed_subject_types}
          If unclear, action="unknown", subject_type="unknown".
      backyard:
        system: |
          Classify one backyard snapshot for home automation.
          Do not identify people. Return only valid JSON matching the schema.
        user: |
          Camera: {camera_name}
          Environment: {environment}
          Purpose: {purpose}
          Choose action ONLY from allowed_actions.
          Choose subject_type ONLY from allowed_subject_types.
          Confidence 0..1.
          Description <= 200 chars, factual.
          allowed_actions: {allowed_actions}
          allowed_subject_types: {allowed_subject_types}
          If unclear, action="unknown", subject_type="unknown".
      garage:
        system: |
          Classify one garage snapshot for home automation.
          Do not identify people. Return only valid JSON matching the schema.
        user: |
          Camera: {camera_name}
          Environment: {environment}
          Purpose: {purpose}
          Choose action ONLY from allowed_actions.
          Choose subject_type ONLY from allowed_subject_types.
          Confidence 0..1.
          Description <= 200 chars, factual.
          Emphasize entry/threshold actions when clearly supported.
          allowed_actions: {allowed_actions}
          allowed_subject_types: {allowed_subject_types}
          If unclear, action="unknown", subject_type="unknown".
      child_room:
        system: |
          You are Synthia Vision. Classify a child-room snapshot for safety/awareness automations.
          Do NOT identify people. Be conservative.
          Return ONLY valid JSON matching the schema. No extra text.
        user: |
          Camera: {camera_name}
          Environment: {environment}
          Purpose: {purpose}
          Choose action ONLY from allowed_actions.
          Choose subject_type ONLY from allowed_subject_types.
          Confidence 0..1.
          Description <= 200 chars, factual.
          allowed_actions: {allowed_actions}
          allowed_subject_types: {allowed_subject_types}
          If unclear, action="unknown", subject_type="unknown".
      outdoor:
        system: |
          You are Synthia Vision. Classify a single outdoor security snapshot for home automation.
          Do NOT identify people. Do NOT guess names, relationships, or personal traits.
          Return ONLY valid JSON matching the schema. No extra text.
        user: |
          Camera: {camera_name}
          Context: Outdoor home area (porch/driveway/yard).
          Choose action ONLY from allowed_actions.
          Choose subject_type ONLY from allowed_subject_types.
          Confidence: 0..1.
          Description: 1 short factual sentence (<= 200 chars). No identity/relationship guesses.
          Prefer action "person_passing_by" when a person is moving past the entrance without stopping.
          Prefer action "person_approaching" when a person is moving toward the entrance.
          Prefer action "person_at_door" when a person is stopped near the door/threshold.
          Prefer action "person_leaving" when a person is moving away after being near the door.
          Use "deliver_package" or "pickup_package" only when package handling is clearly visible.
          Use "loitering" only when lingering/standing is clearly evident; do not infer from one frame.
          Use "suspicious_activity" only with clear evidence (e.g., tampering or forced-entry posture).
          allowed_actions: {allowed_actions}
          allowed_subject_types: {allowed_subject_types}
          If unclear, action="unknown" and subject_type="unknown".
      indoor:
        system: |
          Classify one indoor snapshot for home automation.
          Do not identify people or infer relationships.
          Return only valid JSON matching the schema.
        user: |
          Camera: {camera_name}
          Context: Indoor common area.
          Choose action ONLY from allowed_actions.
          Choose subject_type ONLY from allowed_subject_types.
          Confidence 0..1.
          Description <= 200 chars, factual.
          Prefer action "room_occupied" for normal indoor presence (people visible) when no other action fits.
          Use action "unknown" only when you cannot confidently classify anything, including room_occupied.
          Choose subject_type="adult" or "child" only when clearly distinguishable.
          If a person is visible but you cannot tell adult vs child, use subject_type="unknown".
          If no person/animal/vehicle is present, use subject_type="none".
          If a vehicle is the main subject, use subject_type="vehicle".
          If an animal/pet is the main subject, use subject_type="animal" or "pet"; choose "pet" only when clearly domestic.
          allowed_actions: {allowed_actions}
          allowed_subject_types: {allowed_subject_types}
          If unclear, action="unknown", subject_type="unknown".
      kids_bedroom:
        system: |
          You are Synthia Vision. Classify a kids bedroom snapshot for safety/awareness automations.
          Do NOT identify people. Be conservative. Prefer in_bed/out_of_bed.
          Return ONLY valid JSON matching the schema. No extra text.
        user: |
          Camera: {camera_name}
          Context: Kids bedroom.
          Choose action ONLY from allowed_actions (prefer in_bed/out_of_bed).
          Choose subject_type ONLY from allowed_subject_types.
          Confidence 0..1.
          Description <= 200 chars, factual.
          allowed_actions: {allowed_actions}
          allowed_subject_types: {allowed_subject_types}
          If unclear, action="unknown", subject_type="unknown".
      security:
        system: |
          Classify one home security snapshot with safety focus.
          Do not identify people.
          Return only valid JSON matching the schema.
        user: |
          Camera: {camera_name}
          Context: Home security.
          Choose action ONLY from allowed_actions.
          Choose subject_type ONLY from allowed_subject_types.
          Confidence 0..1.
          Description <= 200 chars, factual.
          Prefer action "person_passing_by" when a person is moving past the entrance without stopping.
          Prefer action "person_approaching" when a person is moving toward the entrance.
          Prefer action "person_at_door" when a person is stopped near the door/threshold.
          Prefer action "person_leaving" when a person is moving away after being near the door.
          Use "deliver_package" or "pickup_package" only when package handling is clearly visible.
          Use "loitering" only when lingering/standing is clearly evident; do not infer from one frame.
          Use suspicious_activity only with clear evidence.
          Do not identify people, infer relationships, or include names.
          Choose subject_type="adult" or "child" only when clearly distinguishable.
          If a person is visible but you cannot tell adult vs child, use subject_type="unknown".
          If no person/animal/vehicle is present, use subject_type="none".
          If a vehicle is the main subject, use subject_type="vehicle".
          If an animal/pet is the main subject, use subject_type="animal" or "pet"; choose "pet" only when clearly domestic.
          allowed_actions: {allowed_actions}
          allowed_subject_types: {allowed_subject_types}
          If uncertain, action="unknown", subject_type="unknown".
    per_camera: {}
