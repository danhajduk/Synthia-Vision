service:
  name: "Synthia Vision"
  slug: "synthia_vision"
  mqtt_prefix: "home/synthiavision"

  paths:
    state_file: "/app/state/state.json"
    config_file: "/app/config/config.yaml"
    snapshots_dir: "/app/state/snapshots"   # optional for debug

mqtt:
  host: "10.0.0.100"
  port: 1883
  heartbeat_interval_seconds: 30
  username: "synthia_vision"
  password: "${MQTT_PASSWORD}"             # allow env-substitution
  tls: false

  subscribe:
    frigate_events_topic: "frigate/events"

  publish:
    retain: true
    qos: 1

  discovery:
    enabled: true
    prefix: "homeassistant"                # HA MQTT Discovery prefix
    device:
      manufacturer: "Dan Hajduk"
      model: "Synthia Vision Node"
      sw_version: "0.1.0"
    # if you want to avoid dupes across reinstalls:
    node_id: "homeassistant_pc_01"         # used to build unique_id prefixes

frigate:
  api_base_url: "http://10.0.0.100:5000"   # or http://frigate:5000 if shared docker net
  snapshot:
    source: "event"                        # event | latest (keep event)
    endpoint_template: "/api/events/{event_id}/snapshot.jpg"
    timeout_s: 5
    max_bytes: 3000000                     # ~3MB cap
    retries: 3
    retry_backoff_s: [0.3, 0.8, 1.5]
    debug_save: true

ai:
  provider: "openai"
  vision_detail: "low"                    # low | high | auto
  image_preprocess:
    enabled: true
    max_side_px: 512
    jpeg_quality: 75
    strip_metadata: true
    crop_to_bbox: true
    bbox_padding: 0.2
  openai:
    api_key: "${OPENAI_API_KEY}"
    model: "gpt-4o-mini"                   # pick your preferred vision-capable model
    timeout_s: 20
    max_output_tokens: 200
    retry_attempts: 3
    retry_backoff_s: [0.5, 1.0, 2.0]

  # Controls strict JSON output
  structured_output:
    mode: "json_schema"                    # json_schema | json_object
    schema_name: "synthia_vision_event"
    # Keep the schema in config so you can tweak actions without code changes:
    schema:
      type: object
      additionalProperties: false
      required: ["action", "subject_type", "confidence", "description"]
      properties:
        action:
          type: string
          enum:
            - unknown
            - room_occupied
            - person_passing_by
            - person_approaching
            - person_at_door
            - person_leaving
            - deliver_package
            - pickup_package
            - package_left_unattended
            - vehicle_arrival
            - vehicle_departure
            - vehicle_detected
            - delivery_vehicle
            - loitering
            - suspicious_activity
            - animal_detected
            - person_entered
            - person_exited
            - in_bed
            - out_of_bed
        subject_type:
          type: string
          enum:
            - none
            - adult
            - child
            - pet
            - animal
            - vehicle
            - unknown
        confidence:
          type: number
          minimum: 0
          maximum: 1
        description:
          type: string
          minLength: 1
          maxLength: 200

  prompts:
    default_preset: "outdoor"
    system: "Classify one home camera image. Return JSON only. No identity guesses."
    presets:
      outdoor:
        system: |
          You are Synthia Vision. Classify a single outdoor security snapshot for home automation.
          Do NOT identify people. Do NOT guess names, relationships, or personal traits.
          Return ONLY valid JSON matching the schema. No extra text.
        user: |
          Camera: {camera_name}
          Context: Outdoor home area (porch/driveway/yard).
          Choose action ONLY from allowed_actions.
          Choose subject_type ONLY from allowed_subject_types.
          Confidence: 0..1.
          Description: 1 short factual sentence (<= 200 chars). No identity/relationship guesses.
          Prefer action "person_passing_by" when a person is moving past the entrance without stopping.
          Prefer action "person_approaching" when a person is moving toward the entrance.
          Prefer action "person_at_door" when a person is stopped near the door/threshold.
          Prefer action "person_leaving" when a person is moving away after being near the door.
          Use "deliver_package" or "pickup_package" only when package handling is clearly visible.
          Use "loitering" only when lingering/standing is clearly evident; do not infer from one frame.
          Use "suspicious_activity" only with clear evidence (e.g., tampering or forced-entry posture).
          allowed_actions: {allowed_actions}
          allowed_subject_types: {allowed_subject_types}
          If unclear, action="unknown" and subject_type="unknown".
      indoor:
        system: |
          Classify one indoor snapshot for home automation.
          Do not identify people or infer relationships.
          Return only valid JSON matching the schema.
        user: |
          Camera: {camera_name}
          Context: Indoor common area.
          Choose action ONLY from allowed_actions.
          Choose subject_type ONLY from allowed_subject_types.
          Confidence 0..1.
          Description <= 200 chars, factual.
          Prefer action "room_occupied" for normal indoor presence (people visible) when no other action fits.
          Use action "unknown" only when you cannot confidently classify anything, including room_occupied.
          Choose subject_type="adult" or "child" only when clearly distinguishable.
          If a person is visible but you cannot tell adult vs child, use subject_type="unknown".
          If no person/animal/vehicle is present, use subject_type="none".
          If a vehicle is the main subject, use subject_type="vehicle".
          If an animal/pet is the main subject, use subject_type="animal" or "pet"; choose "pet" only when clearly domestic.
          allowed_actions: {allowed_actions}
          allowed_subject_types: {allowed_subject_types}
          If unclear, action="unknown", subject_type="unknown".
      kids_bedroom:
        system: |
          You are Synthia Vision. Classify a kids bedroom snapshot for safety/awareness automations.
          Do NOT identify people. Be conservative. Prefer in_bed/out_of_bed.
          Return ONLY valid JSON matching the schema. No extra text.
        user: |
          Camera: {camera_name}
          Context: Kids bedroom.
          Choose action ONLY from allowed_actions (prefer in_bed/out_of_bed).
          Choose subject_type ONLY from allowed_subject_types.
          Confidence 0..1.
          Description <= 200 chars, factual.
          allowed_actions: {allowed_actions}
          allowed_subject_types: {allowed_subject_types}
          If unclear, action="unknown", subject_type="unknown".
      security:
        system: |
          Classify one home security snapshot with safety focus.
          Do not identify people.
          Return only valid JSON matching the schema.
        user: |
          Camera: {camera_name}
          Context: Home security.
          Choose action ONLY from allowed_actions.
          Choose subject_type ONLY from allowed_subject_types.
          Confidence 0..1.
          Description <= 200 chars, factual.
          Prefer action "person_passing_by" when a person is moving past the entrance without stopping.
          Prefer action "person_approaching" when a person is moving toward the entrance.
          Prefer action "person_at_door" when a person is stopped near the door/threshold.
          Prefer action "person_leaving" when a person is moving away after being near the door.
          Use "deliver_package" or "pickup_package" only when package handling is clearly visible.
          Use "loitering" only when lingering/standing is clearly evident; do not infer from one frame.
          Use suspicious_activity only with clear evidence.
          Do not identify people, infer relationships, or include names.
          Choose subject_type="adult" or "child" only when clearly distinguishable.
          If a person is visible but you cannot tell adult vs child, use subject_type="unknown".
          If no person/animal/vehicle is present, use subject_type="none".
          If a vehicle is the main subject, use subject_type="vehicle".
          If an animal/pet is the main subject, use subject_type="animal" or "pet"; choose "pet" only when clearly domestic.
          allowed_actions: {allowed_actions}
          allowed_subject_types: {allowed_subject_types}
          If uncertain, action="unknown", subject_type="unknown".
    # Optional per-camera prompt overrides later:
    per_camera: {}

policy:
  actions:
    default_action: "unknown"
    allowed:
      - unknown
      - room_occupied
      - person_passing_by
      - person_approaching
      - person_at_door
      - person_leaving
      - deliver_package
      - pickup_package
      - package_left_unattended
      - vehicle_arrival
      - vehicle_departure
      - vehicle_detected
      - delivery_vehicle
      - loitering
      - suspicious_activity
      - animal_detected
      - person_entered
      - person_exited
      - in_bed
      - out_of_bed
  subject_types:
    default: "unknown"
    allowed:
      - none
      - adult
      - child
      - pet
      - animal
      - vehicle
      - unknown

  # Global defaults applied to all cameras unless overridden below
  defaults:
    enabled: true
    process_on: ["end", "update"]          # process at end and update events
    min_process_interval_s: 30             # no more than once per camera/event window
    labels: ["person"]
    min_score: 0.0                         # use if frigate provides score you trust
    min_duration_s: 0.0                    # Phase 2 if duration available/reliable
    require_zones: []                      # e.g. ["porch"] later
    confidence_threshold: 0.75

  # Multi-camera-ready; start with just doorbell enabled
  cameras:
    doorbell:
      name: "Front Door"
      enabled: true
      prompt_preset: "outdoor"
      labels: ["person"]
      confidence_threshold: 0.60
      cooldown_s: 30
      # Optional per-camera overrides for rare cases:
      # vision_detail: "high"
      # max_side_px: 768
      actions:
        # Optional: allow/deny actions per camera
        allowed: ["unknown", "person_passing_by", "person_approaching", "person_at_door", "person_leaving", "deliver_package", "pickup_package", "package_left_unattended", "loitering", "suspicious_activity", "vehicle_detected", "delivery_vehicle", "animal_detected"]
    livingroom:
      name: "Living Room"
      enabled: true
      prompt_preset: "indoor"
      labels: ["person"] 
      confidence_threshold: 0.65
      cooldown_s: 60

modes:
  # These are HA-controlled toggles that modify behavior
  doorbell_only_mode:
    enabled: true
    allowed_cameras: ["doorbell","livingroom"]  # could also block specific cameras instead of allow-listing

  high_precision_mode:
    enabled: false
    overrides:
      confidence_threshold: 0.85
      # could also tighten labels/zones later

budget:
  enabled: true
  currency: "USD"
  monthly_limit: 10.00
  behavior_when_exceeded: "block_openai"   # block_openai | disable_service
  publish_status: true

dedupe:
  recent_event_ids_max: 400
  per_camera_cooldown_default_s: 30
  # Keep empty when processing both end+update via policy defaults
  ignore_event_types: []

topics:
  # Centralized topic layout so you can change prefixes without hunting code
  status: "synthia/synthiavision/status"
  heartbeat_ts: "synthia/synthiavision/heartbeat_ts"
  last_error: "{mqtt_prefix}/last_error"

  camera:
    enabled: "{mqtt_prefix}/camera/{camera}/enabled"
    enabled_set: "{mqtt_prefix}/camera/{camera}/enabled/set"
    process_end_events: "{mqtt_prefix}/camera/{camera}/process_end_events"
    process_end_events_set: "{mqtt_prefix}/camera/{camera}/process_end_events/set"
    process_update_events: "{mqtt_prefix}/camera/{camera}/process_update_events"
    process_update_events_set: "{mqtt_prefix}/camera/{camera}/process_update_events/set"
    action: "{mqtt_prefix}/camera/{camera}/action"
    subject_type: "{mqtt_prefix}/camera/{camera}/subject_type"
    confidence: "{mqtt_prefix}/camera/{camera}/confidence"
    description: "{mqtt_prefix}/camera/{camera}/description"
    result_status: "{mqtt_prefix}/camera/{camera}/result_status"
    last_event_id: "{mqtt_prefix}/camera/{camera}/last_event_id"
    last_event_ts: "{mqtt_prefix}/camera/{camera}/last_event_ts"

  cost:
    last: "{mqtt_prefix}/cost/last"
    daily_total: "{mqtt_prefix}/cost/daily_total"
    month2day_total: "{mqtt_prefix}/cost/month2day_total"
    avg_per_event: "{mqtt_prefix}/cost/avg_per_event"
    monthly_by_camera: "{mqtt_prefix}/cost/monthly_by_camera/{camera}"

  tokens:
    avg_per_request: "{mqtt_prefix}/tokens/avg_per_request"
    avg_per_day: "{mqtt_prefix}/tokens/avg_per_day"

  events:
    count_total: "{mqtt_prefix}/events/count_total"
    count_today: "{mqtt_prefix}/events/count_today"

  control:
    enabled: "{mqtt_prefix}/control/enabled"
    enabled_set: "{mqtt_prefix}/control/enabled/set"
    monthly_budget: "{mqtt_prefix}/control/monthly_budget"
    monthly_budget_set: "{mqtt_prefix}/control/monthly_budget/set"
    confidence_threshold: "{mqtt_prefix}/control/confidence_threshold"
    confidence_threshold_set: "{mqtt_prefix}/control/confidence_threshold/set"
    doorbell_only_mode: "{mqtt_prefix}/control/doorbell_only_mode"
    doorbell_only_mode_set: "{mqtt_prefix}/control/doorbell_only_mode/set"
    high_precision_mode: "{mqtt_prefix}/control/high_precision_mode"
    high_precision_mode_set: "{mqtt_prefix}/control/high_precision_mode/set"
    updates_per_event: "{mqtt_prefix}/control/updates_per_event"
    updates_per_event_set: "{mqtt_prefix}/control/updates_per_event/set"

logging:
  level: "INFO"                            # default level
  file: "/app/logs/synthia_vision.log"
  json: false
  retention_days: 14                       # keep rotated logs for N days
  components:
    core: "INFO"
    mqtt: "DEBUG"
    config: "INFO"
    policy: "INFO"
    ai: "INFO"
  files:
    core: "/app/logs/synthia_vision.core.log"
    mqtt: "/app/logs/synthia_vision.mqtt.log"
    config: "/app/logs/synthia_vision.config.log"
    policy: "/app/logs/synthia_vision.policy.log"
    ai: "/app/logs/synthia_vision.ai.log"
