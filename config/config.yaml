schema_version: 1

service:
  name: "Synthia Vision"
  slug: "synthia_vision"
  mqtt_prefix: "home/synthiavision"
  paths:
    state_file: "/app/state/state.json"
    config_file: "/app/config/config.yaml"
    snapshots_dir: "/app/state/snapshots"
    db_file: "/app/state/synthia_vision.db"

includes:
  - "config.d/*.yaml"
