<!doctype html>
<html lang="en"><head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>Errors — {{ title }}</title><link rel="stylesheet" href="{{ request.url_for('ui-static', path='app.css') }}" /></head><body><div class="container"><main class="main"><div class="topbar"><div class="brand"><div class="title">Errors</div><div class="subtitle">Runtime error journal</div></div><a class="btn" href="/ui/admin">Back</a></div><div class="content"><div class="card"><div class="table-wrap"><table class="table"><thead><tr><th>Time</th><th>Component</th><th>Message</th><th>Event</th></tr></thead><tbody>{% for item in errors %}<tr><td>{{ item.ts or '—' }}</td><td>{{ item.component or '—' }}</td><td>{{ item.message or '—' }}</td><td>{{ item.event_id or '—' }}</td></tr>{% endfor %}{% if not errors %}<tr><td colspan="4">No errors.</td></tr>{% endif %}</tbody></table></div></div></div></main></div></body></html>
