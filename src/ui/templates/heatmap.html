<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Heatmap — {{ title }}</title>
  <link rel="stylesheet" href="{{ request.url_for('ui-static', path='app.css') }}" />
</head>
<body data-ui-page="heatmap">
  <div class="container">
    <main class="main">
      <div class="topbar">
        <div class="brand">
          <div class="title">Timeline Heatmap</div>
          <div class="subtitle">Hourly activity density by camera</div>
        </div>
        <div class="row">
          <button class="btn" id="heatmap-refresh" type="button">Refresh</button>
          <a class="btn" href="/ui/admin">Back</a>
        </div>
      </div>
      <div class="content">
        <div class="card">
          <div class="row">
            <div class="field-stack">
              <label class="field-label" for="heatmap-range">Range</label>
              <select class="field" id="heatmap-range">
                <option value="24h">Last 24 Hours</option>
                <option value="avg7d">Average (Last 7 Full Days)</option>
                <option value="avg30d">Average (Last 30 Full Days)</option>
              </select>
            </div>
            <div class="field-stack">
              <label class="field-label" for="heatmap-camera">Camera</label>
              <select class="field" id="heatmap-camera">
                <option value="all">Global + Per Camera</option>
              </select>
            </div>
            <div class="field-stack">
              <label class="field-label" for="heatmap-show-global">Global Overlay</label>
              <label class="toggle"><input type="checkbox" id="heatmap-show-global" checked /> Show Global row</label>
            </div>
            <div class="field-stack">
              <label class="field-label">Days covered</label>
              <div class="sub mono" id="heatmap-days-covered">—</div>
            </div>
          </div>
          <div class="row">
            <div class="sub" id="heatmap-range-summary">Loading heatmap…</div>
            <div class="sub" id="heatmap-status">Loading heatmap…</div>
          </div>
          <div class="sub heatmap-legend">
            Cell shade: total events density.
            <span class="mono">A</span> = AI calls,
            <span class="mono">S</span> = suppressed.
          </div>
          <div class="sub">Hour axis is local time from 00:00 to 23:59.</div>
          <div class="heatmap-wrap" id="heatmap-wrap">
            <div class="sub">Loading…</div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="{{ request.url_for('ui-static', path='app.js') }}"></script>
</body>
</html>
