<!doctype html>
<html lang="en"><head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>Events — {{ title }}</title><link rel="stylesheet" href="{{ request.url_for('ui-static', path='app.css') }}" /></head><body><div class="container"><main class="main"><div class="topbar"><div class="brand"><div class="title">Events</div><div class="subtitle">Recent event journal</div></div><a class="btn" href="/ui/admin">Back</a></div><div class="content"><div class="card"><h3>Recent Events</h3><div class="table-wrap"><table class="table"><thead><tr><th>Time</th><th>Camera</th><th>Status</th><th>Event ID</th></tr></thead><tbody>{% for event in events %}<tr><td>{{ event.ts or '—' }}</td><td>{{ event.camera or '—' }}</td><td>{{ event.result_status or '—' }}</td><td><a href="/ui/events/{{ event.event_id }}">{{ event.event_id }}</a></td></tr>{% endfor %}{% if not events %}<tr><td colspan="4">No events yet.</td></tr>{% endif %}</tbody></table></div></div></div></main></div></body></html>
