<!doctype html>
<html lang="en"><head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>Event Detail — {{ title }}</title><link rel="stylesheet" href="{{ request.url_for('ui-static', path='app.css') }}" /></head><body><div class="container"><main class="main"><div class="topbar"><div class="brand"><div class="title">Event Detail</div><div class="subtitle">{{ event.event_id }}</div></div><a class="btn" href="/ui/events">Back</a></div><div class="content"><div class="card"><div class="table-wrap"><table class="table"><tbody>{% for key, value in event.items() %}{% if key != 'metrics' %}<tr><th>{{ key }}</th><td>{{ value }}</td></tr>{% endif %}{% endfor %}</tbody></table></div></div></div></main></div></body></html>
